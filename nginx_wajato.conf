server {
    server_name wajato.ftech-apps.com.br;
    client_max_body_size 50M;

    # Chunks JS/CSS do Next.js sao imutaveis por hash - cache longo
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # HTML e API - nunca cachear no browser
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/wajato.ftech-apps.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wajato.ftech-apps.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    server_name evo-wajato.ftech-apps.com.br;
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/wajato.ftech-apps.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wajato.ftech-apps.com.br/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = wajato.ftech-apps.com.br) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    listen [::]:80;
    server_name wajato.ftech-apps.com.br;
    return 404;
}

server {
    if ($host = evo-wajato.ftech-apps.com.br) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    listen [::]:80;
    server_name evo-wajato.ftech-apps.com.br;
    return 404;
}

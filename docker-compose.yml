version: '3.8'

services:
  wajato-db:
    image: postgres:15-alpine
    container_name: wajato-db
    restart: always
    environment:
      POSTGRES_USER: wajato
      POSTGRES_PASSWORD: wajato_secure_password_9988
      POSTGRES_DB: wajato_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - wajato-net

  wajato-redis:
    image: redis:7-alpine
    container_name: wajato-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - wajato-net

  wajato-evolution:
    image: evoapicloud/evolution-api:latest
    container_name: wajato-evolution
    restart: always
    ports:
      - "8080:8080"
    environment:
      # General Settings
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - SERVER_URL=http://localhost:8080
      
      # Security / Authentication
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=wajato_global_api_key_5544
      
      # Database Settings (PostgreSQL)
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://wajato:wajato_secure_password_9988@wajato-db:5432/evolution_db?schema=public
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_STATUS=true
      
      # Cache Settings (Redis)
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://wajato-redis:6379/1
      
      # Cors settings
      - CORS_ORIGIN=*
      - CORS_METHODS=GET,POST,PUT,DELETE,OPTIONS
      
      # Webhook settings (optional global, will set up per instance)
      - DELAY_SEND_MESSAGES=true
    depends_on:
      - wajato-db
      - wajato-redis
    networks:
      - wajato-net

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local

networks:
  wajato-net:
    driver: bridge
